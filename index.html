<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة التذاكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Cairo', -apple-system, system-ui, sans-serif; }
        body { background: #fafafa; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState, useEffect, createElement: h } = React;
        
        function App() {
            const [tickets, setTickets] = useState([]);
            const [isAddingTicket, setIsAddingTicket] = useState(false);
            const [editingTicket, setEditingTicket] = useState(null);
            const [viewingTicket, setViewingTicket] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [showImportModal, setShowImportModal] = useState(false);
            const [currentTicket, setCurrentTicket] = useState({
                name: '', link: '', details: '', attachments: [], status: 'pending',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                try {
                    const stored = localStorage.getItem('tickets');
                    if (stored) setTickets(JSON.parse(stored));
                } catch (e) { }
            }, []);

            const saveTickets = (updated) => {
                localStorage.setItem('tickets', JSON.stringify(updated));
                setTickets(updated);
            };

            const addTicket = () => {
                if (!currentTicket.name || !currentTicket.details) return alert('الرجاء إدخال اسم الشركة والتفاصيل');
                saveTickets([...tickets, { ...currentTicket, id: Date.now(), ticketNumber: tickets.length + 1 }]);
                setCurrentTicket({ name: '', link: '', details: '', attachments: [], status: 'pending', date: new Date().toISOString().split('T')[0] });
                setIsAddingTicket(false);
            };

            const updateTicket = () => {
                saveTickets(tickets.map(t => t.id === editingTicket.id ? editingTicket : t));
                setEditingTicket(null);
            };

            const deleteTicket = (id) => {
                if (window.confirm('هل أنت متأكد؟')) saveTickets(tickets.filter(t => t.id !== id));
            };

            const deleteAll = () => {
                if (window.confirm('حذف الكل؟')) saveTickets([]);
            };

            const uploadImage = (e, isEdit) => {
                Array.from(e.target.files).forEach(file => {
                    if (file.size > 5000000) return alert('الصورة كبيرة جداً');
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (isEdit) setEditingTicket(p => ({ ...p, attachments: [...(p.attachments || []), reader.result] }));
                        else setCurrentTicket(p => ({ ...p, attachments: [...p.attachments, reader.result] }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        let imported = [];
                        
                        // Helper function to extract text from Telegram format
                        const extractText = (textData) => {
                            if (typeof textData === 'string') return textData;
                            if (Array.isArray(textData)) {
                                return textData.map(item => {
                                    if (typeof item === 'string') return item;
                                    if (item && item.text) return item.text;
                                    return '';
                                }).join('');
                            }
                            if (textData && textData.text) return textData.text;
                            return '';
                        };
                        
                        // Parse Telegram messages
                        const parseTelegramMessage = (msg) => {
                            const fullText = extractText(msg.text);
                            
                            // Extract name
                            let name = '';
                            const nameMatch = fullText.match(/(?:اسم المشروع او الشركة|اسم الشركة|name)[:\s]+(.+?)(?=\n(?:الروابط|الرابط|link|التفاصيل|http)|$)/is);
                            if (nameMatch) {
                                name = nameMatch[1].trim();
                            } else {
                                const lines = fullText.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
                                name = lines[0] ? lines[0].trim().substring(0, 100) : 'تذكرة مستوردة';
                            }
                            
                            // Extract link
                            let link = '';
                            const urlMatch = fullText.match(/(https?:\/\/[^\s\n]+)/i);
                            if (urlMatch) link = urlMatch[1].trim();
                            
                            // Extract details
                            let details = '';
                            const detailsMatch = fullText.match(/(?:التفاصيل|details)[:\s]+(.+?)$/is);
                            if (detailsMatch) {
                                details = detailsMatch[1].trim();
                            } else {
                                details = fullText.replace(/^#\d+\s*\n?/, '').trim();
                            }
                            
                            return {
                                name: name || 'تذكرة مستوردة',
                                link: link,
                                details: details || fullText,
                                attachments: [],
                                status: 'pending',
                                date: new Date().toISOString().split('T')[0]
                            };
                        };
                        
                        // Handle different JSON formats
                        if (Array.isArray(data)) {
                            // Direct array of tickets
                            imported = data.map(item => ({
                                name: item.name || 'تذكرة',
                                link: item.link || '',
                                details: item.details || '',
                                attachments: item.attachments || [],
                                status: item.status || 'pending',
                                date: item.date || new Date().toISOString().split('T')[0]
                            }));
                        } else if (data.messages && Array.isArray(data.messages)) {
                            // Telegram format
                            imported = data.messages
                                .filter(msg => msg.text)
                                .map(parseTelegramMessage);
                        } else if (data.tickets && Array.isArray(data.tickets)) {
                            // Wrapped format
                            imported = data.tickets.map(item => ({
                                name: item.name || 'تذكرة',
                                link: item.link || '',
                                details: item.details || '',
                                attachments: item.attachments || [],
                                status: item.status || 'pending',
                                date: item.date || new Date().toISOString().split('T')[0]
                            }));
                        }
                        
                        if (imported.length > 0) {
                            const newTickets = imported.map((item, i) => ({
                                id: Date.now() + i * 100,
                                ticketNumber: tickets.length + i + 1,
                                name: item.name,
                                link: item.link,
                                details: item.details,
                                attachments: item.attachments,
                                status: item.status,
                                date: item.date
                            }));
                            
                            saveTickets([...tickets, ...newTickets]);
                            setShowImportModal(false);
                            alert('✅ تم استيراد ' + newTickets.length + ' تذكرة بنجاح!');
                        } else {
                            alert('⚠️ لم يتم العثور على تذاكر في الملف');
                        }
                    } catch (e) {
                        alert('❌ خطأ في الاستيراد: ' + e.message);
                        console.error('Import error:', e);
                    }
                };
                reader.readAsText(file);
            };

            const exportJSON = () => {
                const blob = new Blob([JSON.stringify(tickets, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tickets.json';
                a.click();
            };

            const filtered = tickets.filter(t => {
                const search = (t.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
                              (t.details || '').toLowerCase().includes(searchTerm.toLowerCase());
                const status = filterStatus === 'all' || t.status === filterStatus;
                return search && status;
            });

            return h('div', { className: 'min-h-screen bg-gray-50 p-4 md:p-6' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('div', { className: 'bg-white p-6 md:p-8 rounded-xl shadow-sm mb-6 border border-gray-200' },
                        h('div', { className: 'flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4' },
                            h('div', null,
                                h('h1', { className: 'text-3xl md:text-4xl font-bold mb-2 text-gray-900' }, 'نظام إدارة التذاكر'),
                                h('p', { className: 'text-gray-600' }, 'إدارة ومتابعة تذاكر العمل')
                            ),
                            h('div', { className: 'flex gap-3' },
                                h('button', { onClick: deleteAll, className: 'bg-white border border-red-200 text-red-600 px-4 py-2.5 rounded-lg hover:bg-red-50 font-semibold' }, 'حذف الكل'),
                                h('button', { onClick: () => setShowImportModal(true), className: 'bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-50 font-semibold' }, 'استيراد'),
                                h('button', { onClick: exportJSON, className: 'bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-50 font-semibold' }, 'تصدير')
                            )
                        ),
                        h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                            h('div', { className: 'bg-gray-50 rounded-lg p-4 border' },
                                h('p', { className: 'text-sm text-gray-600' }, 'الإجمالي'),
                                h('p', { className: 'text-3xl font-bold' }, tickets.length)
                            ),
                            h('div', { className: 'bg-orange-50 rounded-lg p-4 border border-orange-200' },
                                h('p', { className: 'text-sm text-orange-700' }, 'انتظار'),
                                h('p', { className: 'text-3xl font-bold text-orange-600' }, tickets.filter(t => t.status === 'pending').length)
                            ),
                            h('div', { className: 'bg-blue-50 rounded-lg p-4 border border-blue-200' },
                                h('p', { className: 'text-sm text-blue-700' }, 'تنفيذ'),
                                h('p', { className: 'text-3xl font-bold text-blue-600' }, tickets.filter(t => t.status === 'in-progress').length)
                            ),
                            h('div', { className: 'bg-green-50 rounded-lg p-4 border border-green-200' },
                                h('p', { className: 'text-sm text-green-700' }, 'مكتمل'),
                                h('p', { className: 'text-3xl font-bold text-green-600' }, tickets.filter(t => t.status === 'completed').length)
                            )
                        )
                    ),

                    h('div', { className: 'bg-white p-4 rounded-xl shadow-sm mb-6 border' },
                        h('div', { className: 'flex flex-col md:flex-row gap-3' },
                            h('input', {
                                type: 'text',
                                value: searchTerm,
                                onChange: (e) => setSearchTerm(e.target.value),
                                placeholder: 'ابحث...',
                                className: 'flex-1 p-3 border rounded-lg outline-none'
                            }),
                            h('select', {
                                value: filterStatus,
                                onChange: (e) => setFilterStatus(e.target.value),
                                className: 'p-3 border rounded-lg bg-white'
                            },
                                h('option', { value: 'all' }, 'الكل'),
                                h('option', { value: 'pending' }, 'انتظار'),
                                h('option', { value: 'in-progress' }, 'تنفيذ'),
                                h('option', { value: 'completed' }, 'مكتمل')
                            ),
                            h('button', {
                                onClick: () => setIsAddingTicket(true),
                                className: 'bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800 font-semibold'
                            }, '+ تذكرة جديدة')
                        )
                    ),

                    (isAddingTicket || editingTicket) && h('div', { className: 'bg-white p-6 rounded-xl shadow-sm mb-6 border' },
                        h('h3', { className: 'text-2xl font-bold mb-6' }, editingTicket ? 'تعديل' : 'تذكرة جديدة'),
                        h('div', { className: 'space-y-4' },
                            h('input', {
                                type: 'text',
                                value: editingTicket ? editingTicket.name : currentTicket.name,
                                onChange: (e) => editingTicket ? 
                                    setEditingTicket({ ...editingTicket, name: e.target.value }) :
                                    setCurrentTicket({ ...currentTicket, name: e.target.value }),
                                placeholder: 'اسم الشركة',
                                className: 'w-full p-3 border rounded-lg'
                            }),
                            h('input', {
                                type: 'url',
                                value: editingTicket ? editingTicket.link : currentTicket.link,
                                onChange: (e) => editingTicket ?
                                    setEditingTicket({ ...editingTicket, link: e.target.value }) :
                                    setCurrentTicket({ ...currentTicket, link: e.target.value }),
                                placeholder: 'الرابط',
                                className: 'w-full p-3 border rounded-lg',
                                dir: 'ltr'
                            }),
                            h('textarea', {
                                value: editingTicket ? editingTicket.details : currentTicket.details,
                                onChange: (e) => editingTicket ?
                                    setEditingTicket({ ...editingTicket, details: e.target.value }) :
                                    setCurrentTicket({ ...currentTicket, details: e.target.value }),
                                placeholder: 'التفاصيل',
                                className: 'w-full p-3 border rounded-lg h-32 resize-none'
                            }),
                            h('div', { className: 'grid grid-cols-2 gap-4' },
                                h('select', {
                                    value: editingTicket ? editingTicket.status : currentTicket.status,
                                    onChange: (e) => editingTicket ?
                                        setEditingTicket({ ...editingTicket, status: e.target.value }) :
                                        setCurrentTicket({ ...currentTicket, status: e.target.value }),
                                    className: 'p-3 border rounded-lg bg-white'
                                },
                                    h('option', { value: 'pending' }, 'انتظار'),
                                    h('option', { value: 'in-progress' }, 'تنفيذ'),
                                    h('option', { value: 'completed' }, 'مكتمل')
                                ),
                                h('input', {
                                    type: 'date',
                                    value: editingTicket ? editingTicket.date : currentTicket.date,
                                    onChange: (e) => editingTicket ?
                                        setEditingTicket({ ...editingTicket, date: e.target.value }) :
                                        setCurrentTicket({ ...currentTicket, date: e.target.value }),
                                    className: 'p-3 border rounded-lg'
                                })
                            ),
                            h('input', {
                                type: 'file',
                                accept: 'image/*',
                                multiple: true,
                                onChange: (e) => uploadImage(e, !!editingTicket),
                                className: 'w-full p-3 border rounded-lg'
                            }),
                            ((editingTicket?.attachments || currentTicket.attachments).length > 0) &&
                            h('div', { className: 'grid grid-cols-3 gap-3' },
                                (editingTicket?.attachments || currentTicket.attachments).map((img, i) =>
                                    h('div', { key: i, className: 'relative group' },
                                        h('img', { src: img, className: 'w-full h-24 object-cover rounded-lg border' }),
                                        h('button', {
                                            onClick: () => {
                                                if (editingTicket) setEditingTicket(p => ({ ...p, attachments: p.attachments.filter((_, idx) => idx !== i) }));
                                                else setCurrentTicket(p => ({ ...p, attachments: p.attachments.filter((_, idx) => idx !== i) }));
                                            },
                                            className: 'absolute top-1 left-1 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100'
                                        }, '×')
                                    )
                                )
                            )
                        ),
                        h('div', { className: 'flex gap-3 mt-6' },
                            h('button', {
                                onClick: editingTicket ? updateTicket : addTicket,
                                className: 'flex-1 bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800 font-semibold'
                            }, 'حفظ'),
                            h('button', {
                                onClick: () => { setIsAddingTicket(false); setEditingTicket(null); },
                                className: 'flex-1 bg-gray-200 px-6 py-3 rounded-lg hover:bg-gray-300 font-semibold'
                            }, 'إلغاء')
                        )
                    ),

                    showImportModal && h('div', {
                        className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4',
                        onClick: () => setShowImportModal(false)
                    },
                        h('div', {
                            className: 'bg-white rounded-xl p-8 max-w-md w-full',
                            onClick: (e) => e.stopPropagation()
                        },
                            h('h3', { className: 'text-2xl font-bold mb-4' }, 'استيراد تذاكر'),
                            h('p', { className: 'text-gray-600 mb-4' }, 'اختر ملف JSON'),
                            h('input', {
                                type: 'file',
                                accept: '.json',
                                onChange: handleImport,
                                className: 'w-full p-3 border rounded-lg mb-4'
                            }),
                            h('button', {
                                onClick: () => setShowImportModal(false),
                                className: 'w-full bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800'
                            }, 'إغلاق')
                        )
                    ),

                    h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                        filtered.map(ticket =>
                            h('div', {
                                key: ticket.id,
                                className: 'bg-white rounded-xl shadow-sm border p-6 hover:shadow-md transition-all'
                            },
                                h('div', { className: 'flex justify-between mb-4' },
                                    h('div', { className: 'bg-gray-900 text-white w-14 h-14 rounded-lg flex items-center justify-center font-bold text-xl' },
                                        ticket.ticketNumber
                                    ),
                                    h('div', { className: 'flex gap-2' },
                                        h('button', {
                                            onClick: () => setViewingTicket(ticket),
                                            className: 'p-2 hover:bg-blue-50 rounded-lg'
                                        }, '👁'),
                                        h('button', {
                                            onClick: () => setEditingTicket(ticket),
                                            className: 'p-2 hover:bg-green-50 rounded-lg'
                                        }, '✏'),
                                        h('button', {
                                            onClick: () => deleteTicket(ticket.id),
                                            className: 'p-2 hover:bg-red-50 rounded-lg'
                                        }, '🗑')
                                    )
                                ),
                                h('h3', { className: 'font-bold text-xl mb-3' }, ticket.name),
                                ticket.link && h('a', {
                                    href: ticket.link,
                                    target: '_blank',
                                    className: 'text-blue-600 text-sm block mb-3 truncate hover:underline',
                                    dir: 'ltr'
                                }, ticket.link),
                                h('div', { className: 'bg-gray-50 rounded-lg p-4 border mb-4' },
                                    h('p', {
                                        className: 'text-sm text-gray-700',
                                        style: { maxHeight: '100px', overflowY: 'auto' }
                                    }, ticket.details)
                                ),
                                (ticket.attachments?.length > 0) && h('div', { className: 'grid grid-cols-3 gap-2' },
                                    ticket.attachments.slice(0, 6).map((img, i) =>
                                        h('img', {
                                            key: i,
                                            src: img,
                                            className: 'w-full h-24 object-cover rounded-lg cursor-pointer border hover:border-gray-400',
                                            onClick: () => window.open(img, '_blank')
                                        })
                                    )
                                )
                            )
                        )
                    ),

                    filtered.length === 0 && h('div', { className: 'text-center py-20' },
                        h('p', { className: 'text-xl text-gray-500' }, 'لا توجد تذاكر')
                    )
                )
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
