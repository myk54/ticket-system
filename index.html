<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة التذاكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Cairo', -apple-system, system-ui, sans-serif; }
        body { background: #fafafa; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState, useEffect, createElement: h } = React;
        
        const SUPABASE_URL = 'https://dpffflftuydonufluwmx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7IaPwDdiUmyD182o3RB7Cw_8Q18zCXu';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const getFileIcon = (filename) => {
            const ext = (filename || '').split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) return '🖼️';
            if (['pdf'].includes(ext)) return '📄';
            if (['doc', 'docx'].includes(ext)) return '📝';
            if (['xls', 'xlsx'].includes(ext)) return '📊';
            if (['ppt', 'pptx'].includes(ext)) return '📽️';
            if (['zip', 'rar', '7z'].includes(ext)) return '📦';
            if (['mp4', 'mov', 'avi'].includes(ext)) return '🎬';
            if (['mp3', 'wav'].includes(ext)) return '🎵';
            return '📎';
        };

        const isImage = (filename) => {
            const ext = (filename || '').split('.').pop().toLowerCase();
            return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext);
        };
        
        function App() {
            const [tickets, setTickets] = useState([]);
            const [isAddingTicket, setIsAddingTicket] = useState(false);
            const [editingTicket, setEditingTicket] = useState(null);
            const [viewingTicket, setViewingTicket] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [showImportModal, setShowImportModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [uploadingFiles, setUploadingFiles] = useState(false);
            const [currentTicket, setCurrentTicket] = useState({
                name: '', link: '', details: '', attachments: [], status: 'pending',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => { fetchTickets(); }, []);

            const fetchTickets = async () => {
                setLoading(true);
                try {
                    const { data, error } = await sb.from('tickets').select('*').order('created_at', { ascending: false });
                    if (error) throw error;
                    setTickets(data.map(t => ({
                        id: t.id, ticketNumber: t.ticket_number, name: t.name, link: t.link || '',
                        details: t.details, attachments: t.attachments || [], status: t.status, date: t.date
                    })));
                } catch (e) {
                    console.error('Error:', e);
                    alert('خطأ في تحميل التذاكر: ' + e.message);
                } finally { setLoading(false); }
            };

            const uploadFile = async (file) => {
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
                const filePath = `uploads/${fileName}`;
                const { error } = await sb.storage.from('attachments').upload(filePath, file);
                if (error) throw error;
                const { data: urlData } = sb.storage.from('attachments').getPublicUrl(filePath);
                return { url: urlData.publicUrl, name: file.name, type: file.type, size: file.size, path: filePath };
            };

            const deleteFile = async (filePath) => {
                try { if (filePath) await sb.storage.from('attachments').remove([filePath]); } catch (e) { console.error(e); }
            };

            const addTicket = async () => {
                if (!currentTicket.name || !currentTicket.details) return alert('الرجاء إدخال اسم الشركة والتفاصيل');
                setSaving(true);
                try {
                    const num = tickets.length > 0 ? Math.max(...tickets.map(t => t.ticketNumber || 0)) + 1 : 1;
                    const { error } = await sb.from('tickets').insert([{
                        ticket_number: num, name: currentTicket.name, link: currentTicket.link,
                        details: currentTicket.details, attachments: currentTicket.attachments,
                        status: currentTicket.status, date: currentTicket.date
                    }]);
                    if (error) throw error;
                    await fetchTickets();
                    setCurrentTicket({ name: '', link: '', details: '', attachments: [], status: 'pending', date: new Date().toISOString().split('T')[0] });
                    setIsAddingTicket(false);
                } catch (e) { alert('خطأ: ' + e.message); } finally { setSaving(false); }
            };

            const updateTicket = async () => {
                setSaving(true);
                try {
                    const { error } = await sb.from('tickets').update({
                        name: editingTicket.name, link: editingTicket.link, details: editingTicket.details,
                        attachments: editingTicket.attachments, status: editingTicket.status, date: editingTicket.date
                    }).eq('id', editingTicket.id);
                    if (error) throw error;
                    await fetchTickets();
                    setEditingTicket(null);
                } catch (e) { alert('خطأ: ' + e.message); } finally { setSaving(false); }
            };

            const deleteTicket = async (id) => {
                if (!window.confirm('هل أنت متأكد؟')) return;
                try {
                    const ticket = tickets.find(t => t.id === id);
                    if (ticket?.attachments) for (const att of ticket.attachments) if (att.path) await deleteFile(att.path);
                    const { error } = await sb.from('tickets').delete().eq('id', id);
                    if (error) throw error;
                    await fetchTickets();
                } catch (e) { alert('خطأ: ' + e.message); }
            };

            const deleteAll = async () => {
                if (!window.confirm('حذف الكل؟')) return;
                try {
                    for (const t of tickets) if (t.attachments) for (const att of t.attachments) if (att.path) await deleteFile(att.path);
                    await sb.from('tickets').delete().neq('id', 0);
                    setTickets([]);
                } catch (e) { alert('خطأ: ' + e.message); }
            };

            const handleFileUpload = async (e, isEdit) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                setUploadingFiles(true);
                try {
                    const uploaded = [];
                    for (const file of files) {
                        if (file.size > 10 * 1024 * 1024) { alert(`${file.name} كبير جداً`); continue; }
                        uploaded.push(await uploadFile(file));
                    }
                    if (isEdit) setEditingTicket(p => ({ ...p, attachments: [...(p.attachments || []), ...uploaded] }));
                    else setCurrentTicket(p => ({ ...p, attachments: [...p.attachments, ...uploaded] }));
                } catch (err) { alert('خطأ: ' + err.message); } finally { setUploadingFiles(false); e.target.value = ''; }
            };

            const removeAttachment = async (index, isEdit) => {
                const atts = isEdit ? editingTicket.attachments : currentTicket.attachments;
                if (atts[index]?.path) await deleteFile(atts[index].path);
                if (isEdit) setEditingTicket(p => ({ ...p, attachments: p.attachments.filter((_, i) => i !== index) }));
                else setCurrentTicket(p => ({ ...p, attachments: p.attachments.filter((_, i) => i !== index) }));
            };

            const handleImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        let imported = [];
                        const extractText = (t) => typeof t === 'string' ? t : Array.isArray(t) ? t.map(i => typeof i === 'string' ? i : i?.text || '').join('') : t?.text || '';
                        
                        if (data.messages) {
                            imported = data.messages.filter(m => m.type === 'message' && m.text).map(msg => {
                                const txt = extractText(msg.text);
                                const nameMatch = txt.match(/(?:اسم المشروع او الشركة|اسم الشركة)[:\s]+(.+?)(?=\n|$)/is);
                                const urlMatch = txt.match(/(https?:\/\/[^\s\n]+)/i);
                                return {
                                    name: nameMatch?.[1]?.trim() || txt.split('\n')[0]?.substring(0, 100) || 'تذكرة',
                                    link: urlMatch?.[1] || '', details: txt, status: 'pending',
                                    date: msg.date?.split('T')[0] || new Date().toISOString().split('T')[0], attachments: []
                                };
                            });
                        } else if (Array.isArray(data)) {
                            imported = data.map(t => ({ name: t.name || 'تذكرة', link: t.link || '', details: t.details || '',
                                status: t.status || 'pending', date: t.date || new Date().toISOString().split('T')[0], attachments: t.attachments || [] }));
                        }
                        if (!imported.length) return alert('لم يتم العثور على بيانات');
                        
                        setSaving(true);
                        const start = tickets.length ? Math.max(...tickets.map(t => t.ticketNumber || 0)) + 1 : 1;
                        await sb.from('tickets').insert(imported.map((t, i) => ({
                            ticket_number: start + i, name: t.name, link: t.link, details: t.details,
                            attachments: t.attachments, status: t.status, date: t.date
                        })));
                        await fetchTickets();
                        setShowImportModal(false);
                        alert('✅ تم استيراد ' + imported.length + ' تذكرة بنجاح!');
                    } catch (err) { alert('❌ خطأ: ' + err.message); } finally { setSaving(false); }
                };
                reader.readAsText(file);
            };

            const exportTickets = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(tickets, null, 2)], { type: 'application/json' }));
                a.download = 'tickets.json';
                a.click();
            };

            const filtered = tickets.filter(t => {
                const search = (t.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
                              (t.details || '').toLowerCase().includes(searchTerm.toLowerCase());
                const status = filterStatus === 'all' || t.status === filterStatus;
                return search && status;
            });

            const renderEditAtt = (att, i, isEdit) => {
                const name = att.name || 'file';
                return h('div', { key: i, className: 'relative' },
                    isImage(name) 
                        ? h('img', { src: att.url, className: 'w-full h-16 object-cover rounded cursor-pointer', onClick: () => window.open(att.url, '_blank') })
                        : h('div', { className: 'w-full h-16 bg-gray-100 rounded flex flex-col items-center justify-center cursor-pointer', onClick: () => window.open(att.url, '_blank') },
                            h('span', { className: 'text-xl' }, getFileIcon(name)),
                            h('span', { className: 'text-xs text-gray-500 truncate w-full text-center px-1' }, name.substring(0, 8))
                        ),
                    h('button', { onClick: () => removeAttachment(i, isEdit), className: 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center' }, '×')
                );
            };

            return h('div', { className: 'min-h-screen bg-gray-50 p-4 md:p-6' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    
                    // Header Card with Stats
                    h('div', { className: 'bg-white p-6 md:p-8 rounded-xl shadow-sm mb-6 border border-gray-200' },
                        h('div', { className: 'flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4' },
                            h('div', null,
                                h('h1', { className: 'text-3xl md:text-4xl font-bold mb-2 text-gray-900' }, 'نظام إدارة التذاكر'),
                                h('p', { className: 'text-gray-600' }, 'إدارة ومتابعة تذاكر العمل')
                            ),
                            h('div', { className: 'flex gap-3' },
                                h('button', { onClick: deleteAll, className: 'bg-white border border-red-200 text-red-600 px-4 py-2.5 rounded-lg hover:bg-red-50 font-semibold' }, 'حذف الكل'),
                                h('button', { onClick: () => setShowImportModal(true), className: 'bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-50 font-semibold' }, 'استيراد'),
                                h('button', { onClick: exportTickets, className: 'bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-50 font-semibold' }, 'تصدير')
                            )
                        ),
                        h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                            h('div', { className: 'bg-gray-50 rounded-lg p-4 border' },
                                h('p', { className: 'text-sm text-gray-600' }, 'الإجمالي'),
                                h('p', { className: 'text-3xl font-bold' }, tickets.length)
                            ),
                            h('div', { className: 'bg-orange-50 rounded-lg p-4 border border-orange-200' },
                                h('p', { className: 'text-sm text-orange-700' }, 'انتظار'),
                                h('p', { className: 'text-3xl font-bold text-orange-600' }, tickets.filter(t => t.status === 'pending').length)
                            ),
                            h('div', { className: 'bg-blue-50 rounded-lg p-4 border border-blue-200' },
                                h('p', { className: 'text-sm text-blue-700' }, 'تنفيذ'),
                                h('p', { className: 'text-3xl font-bold text-blue-600' }, tickets.filter(t => t.status === 'in-progress').length)
                            ),
                            h('div', { className: 'bg-green-50 rounded-lg p-4 border border-green-200' },
                                h('p', { className: 'text-sm text-green-700' }, 'مكتمل'),
                                h('p', { className: 'text-3xl font-bold text-green-600' }, tickets.filter(t => t.status === 'completed').length)
                            )
                        )
                    ),

                    // Search Bar
                    h('div', { className: 'bg-white p-4 rounded-xl shadow-sm mb-6 border' },
                        h('div', { className: 'flex flex-col md:flex-row gap-3' },
                            h('input', {
                                type: 'text', value: searchTerm, onChange: (e) => setSearchTerm(e.target.value),
                                placeholder: 'ابحث...', className: 'flex-1 p-3 border rounded-lg outline-none'
                            }),
                            h('select', {
                                value: filterStatus, onChange: (e) => setFilterStatus(e.target.value),
                                className: 'p-3 border rounded-lg bg-white'
                            },
                                h('option', { value: 'all' }, 'الكل'),
                                h('option', { value: 'pending' }, 'انتظار'),
                                h('option', { value: 'in-progress' }, 'تنفيذ'),
                                h('option', { value: 'completed' }, 'مكتمل')
                            ),
                            h('button', {
                                onClick: () => setIsAddingTicket(true),
                                className: 'bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800 font-semibold'
                            }, '+ تذكرة جديدة')
                        )
                    ),

                    // Add/Edit Form - Inline
                    (isAddingTicket || editingTicket) && h('div', { className: 'bg-white p-6 rounded-xl shadow-sm mb-6 border' },
                        h('h3', { className: 'text-2xl font-bold mb-6' }, editingTicket ? 'تعديل' : 'تذكرة جديدة'),
                        h('div', { className: 'space-y-4' },
                            h('input', {
                                type: 'text',
                                value: editingTicket ? editingTicket.name : currentTicket.name,
                                onChange: (e) => editingTicket ? setEditingTicket({ ...editingTicket, name: e.target.value }) : setCurrentTicket({ ...currentTicket, name: e.target.value }),
                                placeholder: 'اسم الشركة', className: 'w-full p-3 border rounded-lg'
                            }),
                            h('input', {
                                type: 'url',
                                value: editingTicket ? editingTicket.link : currentTicket.link,
                                onChange: (e) => editingTicket ? setEditingTicket({ ...editingTicket, link: e.target.value }) : setCurrentTicket({ ...currentTicket, link: e.target.value }),
                                placeholder: 'الرابط', className: 'w-full p-3 border rounded-lg', dir: 'ltr'
                            }),
                            h('textarea', {
                                value: editingTicket ? editingTicket.details : currentTicket.details,
                                onChange: (e) => editingTicket ? setEditingTicket({ ...editingTicket, details: e.target.value }) : setCurrentTicket({ ...currentTicket, details: e.target.value }),
                                placeholder: 'التفاصيل', rows: 4, className: 'w-full p-3 border rounded-lg resize-none'
                            }),
                            h('div', { className: 'grid grid-cols-1 md:grid-cols-3 gap-4' },
                                h('select', {
                                    value: editingTicket ? editingTicket.status : currentTicket.status,
                                    onChange: (e) => editingTicket ? setEditingTicket({ ...editingTicket, status: e.target.value }) : setCurrentTicket({ ...currentTicket, status: e.target.value }),
                                    className: 'p-3 border rounded-lg bg-white'
                                },
                                    h('option', { value: 'pending' }, 'قيد الانتظار'),
                                    h('option', { value: 'in-progress' }, 'قيد التنفيذ'),
                                    h('option', { value: 'completed' }, 'مكتمل')
                                ),
                                h('input', {
                                    type: 'date',
                                    value: editingTicket ? editingTicket.date : currentTicket.date,
                                    onChange: (e) => editingTicket ? setEditingTicket({ ...editingTicket, date: e.target.value }) : setCurrentTicket({ ...currentTicket, date: e.target.value }),
                                    className: 'p-3 border rounded-lg'
                                }),
                                h('input', {
                                    type: 'file', multiple: true,
                                    onChange: (e) => handleFileUpload(e, !!editingTicket),
                                    disabled: uploadingFiles, className: 'p-2 border rounded-lg'
                                })
                            ),
                            uploadingFiles && h('p', { className: 'text-blue-600' }, '⏳ جاري رفع الملفات...'),
                            ((editingTicket?.attachments?.length > 0) || (currentTicket.attachments.length > 0)) && 
                                h('div', { className: 'grid grid-cols-4 md:grid-cols-6 gap-2' },
                                    (editingTicket ? editingTicket.attachments : currentTicket.attachments).map((att, i) => renderEditAtt(att, i, !!editingTicket))
                                ),
                            h('div', { className: 'flex gap-3 mt-6' },
                                h('button', {
                                    onClick: editingTicket ? updateTicket : addTicket,
                                    disabled: saving || uploadingFiles,
                                    className: 'flex-1 bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800 font-semibold disabled:opacity-50'
                                }, saving ? 'جاري الحفظ...' : 'حفظ'),
                                h('button', {
                                    onClick: () => { setIsAddingTicket(false); setEditingTicket(null); },
                                    disabled: saving || uploadingFiles,
                                    className: 'flex-1 bg-gray-200 px-6 py-3 rounded-lg hover:bg-gray-300 font-semibold disabled:opacity-50'
                                }, 'إلغاء')
                            )
                        )
                    ),

                    // Import Modal
                    showImportModal && h('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4', onClick: () => setShowImportModal(false) },
                        h('div', { className: 'bg-white rounded-xl p-8 max-w-md w-full', onClick: (e) => e.stopPropagation() },
                            h('h3', { className: 'text-2xl font-bold mb-4' }, 'استيراد تذاكر'),
                            h('p', { className: 'text-gray-600 mb-4' }, 'اختر ملف JSON'),
                            h('input', { type: 'file', accept: '.json', onChange: handleImport, className: 'w-full p-3 border rounded-lg mb-4' }),
                            saving && h('p', { className: 'text-blue-600 mb-4' }, '⏳ جاري الاستيراد...'),
                            h('button', { onClick: () => setShowImportModal(false), className: 'w-full bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800' }, 'إغلاق')
                        )
                    ),

                    // Loading
                    loading && h('div', { className: 'text-center py-20' },
                        h('div', { className: 'inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent' }),
                        h('p', { className: 'mt-4 text-gray-500' }, 'جاري التحميل...')
                    ),

                    // Tickets Grid - 2 columns like original
                    !loading && h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                        filtered.map(ticket =>
                            h('div', { key: ticket.id, className: 'bg-white rounded-xl shadow-sm border p-6 hover:shadow-md transition-all' },
                                // Header with ticket number and buttons
                                h('div', { className: 'bg-gray-50 p-4 rounded-lg mb-4 flex justify-between items-center' },
                                    h('div', { className: 'bg-gray-900 text-white w-14 h-14 rounded-lg flex items-center justify-center font-bold text-xl' },
                                        ticket.ticketNumber
                                    ),
                                    h('div', { className: 'flex gap-2' },
                                        h('button', { onClick: () => setViewingTicket(ticket), className: 'p-2 hover:bg-blue-50 rounded-lg transition-all', title: 'عرض' }, '👁'),
                                        h('button', { onClick: () => setEditingTicket(ticket), className: 'p-2 hover:bg-green-50 rounded-lg transition-all', title: 'تعديل' }, '✏'),
                                        h('button', { onClick: () => deleteTicket(ticket.id), className: 'p-2 hover:bg-red-50 rounded-lg transition-all', title: 'حذف' }, '🗑')
                                    )
                                ),
                                
                                h('div', { className: 'space-y-4' },
                                    // Company Name Section
                                    h('div', null,
                                        h('label', { className: 'text-xs font-semibold text-gray-500 uppercase block mb-2' }, '🏢 اسم الشركة أو المشروع'),
                                        h('h3', { 
                                            className: 'font-bold text-xl text-gray-900',
                                            style: { direction: /[\u0600-\u06FF]/.test(ticket.name || '') ? 'rtl' : 'ltr', textAlign: /[\u0600-\u06FF]/.test(ticket.name || '') ? 'right' : 'left' }
                                        }, ticket.name || 'بدون عنوان')
                                    ),
                                    
                                    // Link Section
                                    ticket.link && h('div', { className: 'pt-3 border-t border-gray-100' },
                                        h('label', { className: 'text-xs font-semibold text-gray-500 uppercase block mb-2' }, '🔗 الرابط'),
                                        h('a', {
                                            href: ticket.link, target: '_blank', rel: 'noopener noreferrer',
                                            className: 'text-blue-600 text-sm hover:underline block break-all',
                                            dir: 'ltr', style: { textAlign: 'left' }
                                        }, ticket.link)
                                    ),
                                    
                                    // Details Section
                                    h('div', { className: 'pt-3 border-t border-gray-100' },
                                        h('label', { className: 'text-xs font-semibold text-gray-500 uppercase block mb-2' }, '📝 التفاصيل'),
                                        h('div', { className: 'bg-gray-50 rounded-lg p-4 border border-gray-200' },
                                            h('p', {
                                                className: 'text-sm text-gray-700 leading-relaxed whitespace-pre-wrap',
                                                style: { 
                                                    maxHeight: '120px', overflowY: 'auto',
                                                    direction: /[\u0600-\u06FF]/.test(ticket.details || '') ? 'rtl' : 'ltr',
                                                    textAlign: /[\u0600-\u06FF]/.test(ticket.details || '') ? 'right' : 'left'
                                                }
                                            }, ticket.details || 'لا توجد تفاصيل'),
                                            (ticket.details && ticket.details.length > 150) && h('button', {
                                                onClick: () => setViewingTicket(ticket),
                                                className: 'text-blue-600 text-xs font-semibold mt-2 hover:underline'
                                            }, 'اقرأ المزيد...')
                                        )
                                    ),
                                    
                                    // Attachments Section
                                    (ticket.attachments && ticket.attachments.length > 0) && h('div', { className: 'pt-3 border-t border-gray-100' },
                                        h('label', { className: 'text-xs font-semibold text-gray-500 uppercase block mb-3' }, '📎 المرفقات (' + ticket.attachments.length + ')'),
                                        h('div', { className: 'grid grid-cols-3 gap-2' },
                                            ticket.attachments.slice(0, 6).map((att, i) => {
                                                const name = att.name || att.url || 'file';
                                                return isImage(name)
                                                    ? h('img', { key: i, src: att.url, alt: 'مرفق', className: 'w-full h-24 object-cover rounded-lg cursor-pointer border hover:border-gray-400 transition-all', onClick: () => window.open(att.url, '_blank') })
                                                    : h('div', { key: i, onClick: () => window.open(att.url, '_blank'), className: 'w-full h-24 bg-gray-100 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-200 border border-gray-300' },
                                                        h('span', { className: 'text-2xl' }, getFileIcon(name)),
                                                        h('span', { className: 'text-xs text-gray-600 mt-1 truncate w-full text-center px-1' }, name.substring(0, 12))
                                                    );
                                            }),
                                            (ticket.attachments.length > 6) && h('div', {
                                                onClick: () => setViewingTicket(ticket),
                                                className: 'w-full h-24 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer hover:bg-gray-200 border border-gray-300'
                                            }, h('span', { className: 'font-bold text-gray-700' }, '+' + (ticket.attachments.length - 6)))
                                        )
                                    ),
                                    
                                    // Status and Date
                                    h('div', { className: 'pt-3 border-t border-gray-100 flex justify-between items-center' },
                                        h('span', {
                                            className: 'px-3 py-1.5 rounded-lg text-sm font-semibold ' + (
                                                ticket.status === 'completed' ? 'bg-green-100 text-green-700 border border-green-200' :
                                                ticket.status === 'in-progress' ? 'bg-blue-100 text-blue-700 border border-blue-200' :
                                                'bg-orange-100 text-orange-700 border border-orange-200'
                                            )
                                        }, ticket.status === 'completed' ? 'مكتمل' : ticket.status === 'in-progress' ? 'قيد التنفيذ' : 'قيد الانتظار'),
                                        h('span', { className: 'text-sm text-gray-500' }, ticket.date || new Date().toISOString().split('T')[0])
                                    )
                                )
                            )
                        )
                    ),

                    // View Modal
                    viewingTicket && h('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4', onClick: () => setViewingTicket(null) },
                        h('div', { className: 'bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto', onClick: (e) => e.stopPropagation() },
                            h('div', { className: 'p-6 border-b border-gray-200 flex justify-between items-center sticky top-0 bg-white z-10' },
                                h('h3', { className: 'text-2xl font-bold text-gray-900' }, 'تذكرة رقم ' + viewingTicket.ticketNumber),
                                h('button', { onClick: () => setViewingTicket(null), className: 'text-gray-400 hover:text-gray-600 text-3xl w-10 h-10 flex items-center justify-center hover:bg-gray-100 rounded-lg' }, '×')
                            ),
                            h('div', { className: 'p-8 space-y-6' },
                                h('div', null,
                                    h('label', { className: 'text-sm font-semibold text-gray-500 block mb-2' }, 'اسم الشركة أو المشروع'),
                                    h('p', { className: 'text-xl font-bold text-gray-900' }, viewingTicket.name)
                                ),
                                viewingTicket.link && h('div', null,
                                    h('label', { className: 'text-sm font-semibold text-gray-500 block mb-2' }, 'الرابط'),
                                    h('a', { href: viewingTicket.link, target: '_blank', rel: 'noopener noreferrer', className: 'text-blue-600 hover:underline break-all', dir: 'ltr' }, viewingTicket.link)
                                ),
                                h('div', null,
                                    h('label', { className: 'text-sm font-semibold text-gray-500 block mb-2' }, 'التفاصيل'),
                                    h('p', { className: 'text-gray-700 whitespace-pre-wrap leading-relaxed' }, viewingTicket.details)
                                ),
                                (viewingTicket.attachments && viewingTicket.attachments.length > 0) && h('div', null,
                                    h('label', { className: 'text-sm font-semibold text-gray-500 block mb-2' }, 'المرفقات'),
                                    h('div', { className: 'grid grid-cols-2 gap-4' },
                                        viewingTicket.attachments.map((att, i) => {
                                            const name = att.name || 'file';
                                            return h('div', { key: i, className: 'border rounded-lg overflow-hidden cursor-pointer hover:shadow-md', onClick: () => window.open(att.url, '_blank') },
                                                isImage(name)
                                                    ? h('img', { src: att.url, className: 'w-full rounded-lg cursor-pointer hover:scale-105 transition-transform border border-gray-200' })
                                                    : h('div', { className: 'w-full h-32 bg-gray-100 flex flex-col items-center justify-center' },
                                                        h('span', { className: 'text-4xl' }, getFileIcon(name)),
                                                        h('span', { className: 'text-sm text-gray-600 mt-2' }, name)
                                                    )
                                            );
                                        })
                                    )
                                ),
                                h('div', { className: 'grid grid-cols-2 gap-4 pt-4 border-t border-gray-200' },
                                    h('div', null,
                                        h('label', { className: 'text-sm font-semibold text-gray-500 block mb-2' }, 'الحالة'),
                                        h('span', {
                                            className: 'inline-block px-4 py-2 rounded-lg font-semibold ' + (
                                                viewingTicket.status === 'completed' ? 'bg-green-100 text-green-700 border border-green-200' :
                                                viewingTicket.status === 'in-progress' ? 'bg-blue-100 text-blue-700 border border-blue-200' :
                                                'bg-orange-100 text-orange-700 border border-orange-200'
                                            )
                                        }, viewingTicket.status === 'completed' ? 'مكتمل' : viewingTicket.status === 'in-progress' ? 'قيد التنفيذ' : 'قيد الانتظار')
                                    ),
                                    h('div', null,
                                        h('label', { className: 'text-sm font-semibold text-gray-500 block mb-2' }, 'التاريخ'),
                                        h('p', { className: 'font-semibold text-lg text-gray-900' }, viewingTicket.date)
                                    )
                                )
                            )
                        )
                    ),

                    // Empty State
                    !loading && filtered.length === 0 && h('div', { className: 'text-center py-20' },
                        h('p', { className: 'text-xl text-gray-500' }, 'لا توجد تذاكر')
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
