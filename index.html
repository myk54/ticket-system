<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة التذاكر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Cairo', 'Inter', -apple-system, system-ui, sans-serif; }
        body { background: #fafafa; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState, useEffect, createElement: h } = React;
        
        function App() {
            const [tickets, setTickets] = useState([]);
            const [isAddingTicket, setIsAddingTicket] = useState(false);
            const [editingTicket, setEditingTicket] = useState(null);
            const [viewingTicket, setViewingTicket] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [showImportModal, setShowImportModal] = useState(false);
            const [currentTicket, setCurrentTicket] = useState({
                name: '', link: '', details: '', attachments: [], status: 'pending',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => {
                try {
                    const stored = localStorage.getItem('tickets');
                    if (stored) setTickets(JSON.parse(stored));
                } catch (e) { }
            }, []);

            const saveTickets = (updated) => {
                try {
                    localStorage.setItem('tickets', JSON.stringify(updated));
                    setTickets(updated);
                } catch (e) { alert('خطأ في الحفظ'); }
            };

            const addTicket = () => {
                if (!currentTicket.name || !currentTicket.details) return alert('الرجاء إدخال اسم الشركة والتفاصيل');
                saveTickets([...tickets, { ...currentTicket, id: Date.now(), ticketNumber: tickets.length + 1 }]);
                setCurrentTicket({ name: '', link: '', details: '', attachments: [], status: 'pending', date: new Date().toISOString().split('T')[0] });
                setIsAddingTicket(false);
            };

            const updateTicket = () => {
                saveTickets(tickets.map(t => t.id === editingTicket.id ? editingTicket : t));
                setEditingTicket(null);
            };

            const deleteTicket = (id) => {
                if (window.confirm('هل أنت متأكد من حذف التذكرة؟')) saveTickets(tickets.filter(t => t.id !== id));
            };

            const deleteAll = () => {
                if (window.confirm('⚠️ هل أنت متأكد من حذف جميع التذاكر (' + tickets.length + ')؟')) saveTickets([]);
            };

            const uploadImage = (e, isEdit) => {
                Array.from(e.target.files).forEach(file => {
                    if (file.size > 5000000) return alert('حجم الصورة كبير جداً (الحد الأقصى 5MB)');
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        if (isEdit) setEditingTicket(p => ({ ...p, attachments: [...(p.attachments || []), reader.result] }));
                        else setCurrentTicket(p => ({ ...p, attachments: [...p.attachments, reader.result] }));
                    };
                    reader.readAsDataURL(file);
                });
            };

            const exportJSON = () => {
                const blob = new Blob([JSON.stringify(tickets, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tickets_' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
            };

            const filtered = tickets.filter(t => {
                const search = (t.name || '').toLowerCase().includes(searchTerm.toLowerCase()) || 
                              (t.details || '').toLowerCase().includes(searchTerm.toLowerCase());
                const status = filterStatus === 'all' || t.status === filterStatus;
                return search && status;
            });

            const counts = {
                all: tickets.length,
                pending: tickets.filter(t => t.status === 'pending').length,
                progress: tickets.filter(t => t.status === 'in-progress').length,
                done: tickets.filter(t => t.status === 'completed').length
            };

            return h('div', { className: 'min-h-screen bg-gray-50 p-4 md:p-6' },
                h('div', { className: 'max-w-7xl mx-auto' },
                    h('div', { className: 'bg-white p-6 md:p-8 rounded-xl shadow-sm mb-6 border border-gray-200' },
                        h('div', { className: 'flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4' },
                            h('div', null,
                                h('h1', { className: 'text-3xl md:text-4xl font-bold mb-2 text-gray-900' }, 'نظام إدارة التذاكر'),
                                h('p', { className: 'text-gray-600' }, 'إدارة ومتابعة تذاكر العمل والمشاريع')
                            ),
                            h('div', { className: 'flex gap-3 flex-wrap' },
                                h('button', { onClick: deleteAll, className: 'bg-white border border-red-200 text-red-600 px-4 py-2.5 rounded-lg hover:bg-red-50 font-semibold transition-all' }, 'حذف الكل'),
                                h('button', { onClick: () => setShowImportModal(true), className: 'bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-50 font-semibold transition-all' }, 'استيراد'),
                                h('button', { onClick: exportJSON, className: 'bg-white border border-gray-300 text-gray-700 px-4 py-2.5 rounded-lg hover:bg-gray-50 font-semibold transition-all' }, 'تصدير')
                            )
                        ),
                        h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4' },
                            h('div', { className: 'bg-gray-50 rounded-lg p-4 border border-gray-200' },
                                h('p', { className: 'text-sm text-gray-600 mb-1' }, 'إجمالي التذاكر'),
                                h('p', { className: 'text-3xl font-bold text-gray-900' }, counts.all)
                            ),
                            h('div', { className: 'bg-orange-50 rounded-lg p-4 border border-orange-200' },
                                h('p', { className: 'text-sm text-orange-700 mb-1' }, 'قيد الانتظار'),
                                h('p', { className: 'text-3xl font-bold text-orange-600' }, counts.pending)
                            ),
                            h('div', { className: 'bg-blue-50 rounded-lg p-4 border border-blue-200' },
                                h('p', { className: 'text-sm text-blue-700 mb-1' }, 'قيد التنفيذ'),
                                h('p', { className: 'text-3xl font-bold text-blue-600' }, counts.progress)
                            ),
                            h('div', { className: 'bg-green-50 rounded-lg p-4 border border-green-200' },
                                h('p', { className: 'text-sm text-green-700 mb-1' }, 'مكتمل'),
                                h('p', { className: 'text-3xl font-bold text-green-600' }, counts.done)
                            )
                        )
                    ),

                    h('div', { className: 'bg-white p-4 md:p-6 rounded-xl shadow-sm mb-6 border border-gray-200' },
                        h('div', { className: 'flex flex-col md:flex-row gap-3' },
                            h('input', {
                                type: 'text', value: searchTerm, onChange: (e) => setSearchTerm(e.target.value),
                                placeholder: 'ابحث عن التذاكر...',
                                className: 'flex-1 p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400 transition-all'
                            }),
                            h('select', {
                                value: filterStatus, onChange: (e) => setFilterStatus(e.target.value),
                                className: 'p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400 bg-white transition-all'
                            },
                                h('option', { value: 'all' }, 'كل الحالات'),
                                h('option', { value: 'pending' }, 'قيد الانتظار'),
                                h('option', { value: 'in-progress' }, 'قيد التنفيذ'),
                                h('option', { value: 'completed' }, 'مكتمل')
                            ),
                            h('button', {
                                onClick: () => setIsAddingTicket(true),
                                className: 'bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800 font-semibold transition-all'
                            }, 'تذكرة جديدة')
                        )
                    ),

                    (isAddingTicket || editingTicket) && h('div', { className: 'bg-white p-6 md:p-8 rounded-xl shadow-sm mb-6 border border-gray-200' },
                        h('h3', { className: 'text-2xl font-bold mb-6 text-gray-900' }, editingTicket ? 'تعديل التذكرة' : 'تذكرة جديدة'),
                        h('div', { className: 'space-y-4' },
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'اسم الشركة أو المشروع'),
                                h('input', {
                                    type: 'text',
                                    value: editingTicket ? editingTicket.name : currentTicket.name,
                                    onChange: (e) => editingTicket ? 
                                        setEditingTicket({ ...editingTicket, name: e.target.value }) :
                                        setCurrentTicket({ ...currentTicket, name: e.target.value }),
                                    placeholder: 'أدخل اسم الشركة أو المشروع',
                                    className: 'w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400'
                                })
                            ),
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'الرابط'),
                                h('input', {
                                    type: 'url',
                                    value: editingTicket ? editingTicket.link : currentTicket.link,
                                    onChange: (e) => editingTicket ?
                                        setEditingTicket({ ...editingTicket, link: e.target.value }) :
                                        setCurrentTicket({ ...currentTicket, link: e.target.value }),
                                    placeholder: 'https://example.com',
                                    className: 'w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400',
                                    dir: 'ltr'
                                })
                            ),
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'التفاصيل'),
                                h('textarea', {
                                    value: editingTicket ? editingTicket.details : currentTicket.details,
                                    onChange: (e) => editingTicket ?
                                        setEditingTicket({ ...editingTicket, details: e.target.value }) :
                                        setCurrentTicket({ ...currentTicket, details: e.target.value }),
                                    placeholder: 'أدخل تفاصيل التذكرة',
                                    className: 'w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400 h-32 resize-none'
                                })
                            ),
                            h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-4' },
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'الحالة'),
                                    h('select', {
                                        value: editingTicket ? editingTicket.status : currentTicket.status,
                                        onChange: (e) => editingTicket ?
                                            setEditingTicket({ ...editingTicket, status: e.target.value }) :
                                            setCurrentTicket({ ...currentTicket, status: e.target.value }),
                                        className: 'w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400 bg-white'
                                    },
                                        h('option', { value: 'pending' }, 'قيد الانتظار'),
                                        h('option', { value: 'in-progress' }, 'قيد التنفيذ'),
                                        h('option', { value: 'completed' }, 'مكتمل')
                                    )
                                ),
                                h('div', null,
                                    h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'التاريخ'),
                                    h('input', {
                                        type: 'date',
                                        value: editingTicket ? editingTicket.date : currentTicket.date,
                                        onChange: (e) => editingTicket ?
                                            setEditingTicket({ ...editingTicket, date: e.target.value }) :
                                            setCurrentTicket({ ...currentTicket, date: e.target.value }),
                                        className: 'w-full p-3 border border-gray-300 rounded-lg outline-none focus:border-gray-400'
                                    })
                                )
                            ),
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold text-gray-700 mb-2' }, 'المرفقات (الحد الأقصى 5MB لكل صورة)'),
                                h('input', {
                                    type: 'file', accept: 'image/*', multiple: true,
                                    onChange: (e) => uploadImage(e, !!editingTicket),
                                    className: 'w-full p-3 border border-gray-300 rounded-lg'
                                })
                            ),
                            ((editingTicket?.attachments || currentTicket.attachments).length > 0) &&
                            h('div', { className: 'grid grid-cols-3 gap-3' },
                                (editingTicket?.attachments || currentTicket.attachments).map((img, i) =>
                                    h('div', { key: i, className: 'relative group' },
                                        h('img', { src: img, className: 'w-full h-24 object-cover rounded-lg border border-gray-200' }),
                                        h('button', {
                                            onClick: () => {
                                                if (editingTicket) setEditingTicket(p => ({ ...p, attachments: p.attachments.filter((_, idx) => idx !== i) }));
                                                else setCurrentTicket(p => ({ ...p, attachments: p.attachments.filter((_, idx) => idx !== i) }));
                                            },
                                            className: 'absolute top-1 left-1 bg-red-500 text-white w-6 h-6 rounded-full opacity-0 group-hover:opacity-100 transition-opacity'
                                        }, '×')
                                    )
                                )
                            )
                        ),
                        h('div', { className: 'flex gap-3 mt-6' },
                            h('button', {
                                onClick: editingTicket ? updateTicket : addTicket,
                                className: 'flex-1 bg-gray-900 text-white px-6 py-3 rounded-lg hover:bg-gray-800 font-semibold'
                            }, 'حفظ'),
                            h('button', {
                                onClick: () => { setIsAddingTicket(false); setEditingTicket(null); },
                                className: 'flex-1 bg-gray-200 px-6 py-3 rounded-lg hover:bg-gray-300 font-semibold'
                            }, 'إلغاء')
                        )
                    ),

                    h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6' },
                        filtered.map(ticket =>
                            h('div', {
                                key: ticket.id,
                                className: 'bg-white rounded-xl shadow-sm hover:shadow-md transition-all border border-gray-200'
                            },
                                h('div', { className: 'bg-gray-50 p-5 border-b border-gray-200' },
                                    h('div', { className: 'flex justify-between items-center' },
                                        h('div', { className: 'flex items-center gap-4' },
                                            h('div', { className: 'bg-gray-900 text-white w-14 h-14 rounded-lg flex items-center justify-center font-bold text-xl' },
                                                ticket.ticketNumber
                                            ),
                                            h('div', null,
                                                h('span', {
                                                    className: 'inline-block px-3 py-1.5 rounded-lg text-sm font-semibold ' + (
                                                        ticket.status === 'completed' ? 'bg-green-100 text-green-700 border border-green-200' :
                                                        ticket.status === 'in-progress' ? 'bg-blue-100 text-blue-700 border border-blue-200' :
                                                        'bg-orange-100 text-orange-700 border border-orange-200'
                                                    )
                                                },
                                                    ticket.status === 'completed' ? 'مكتمل' :
                                                    ticket.status === 'in-progress' ? 'قيد التنفيذ' : 'قيد الانتظار'
                                                ),
                                                h('p', { className: 'text-sm text-gray-500 mt-2' }, ticket.date)
                                            )
                                        ),
                                        h('div', { className: 'flex gap-2' },
                                            h('button', {
                                                onClick: () => setViewingTicket(ticket),
                                                className: 'text-gray-600 hover:text-blue-600 p-2 rounded-lg hover:bg-blue-50 transition-all'
                                            }, '👁'),
                                            h('button', {
                                                onClick: () => setEditingTicket(ticket),
                                                className: 'text-gray-600 hover:text-green-600 p-2 rounded-lg hover:bg-green-50 transition-all'
                                            }, '✏'),
                                            h('button', {
                                                onClick: () => deleteTicket(ticket.id),
                                                className: 'text-gray-600 hover:text-red-600 p-2 rounded-lg hover:bg-red-50 transition-all'
                                            }, '🗑')
                                        )
                                    )
                                ),

                                h('div', { className: 'p-6' },
                                    h('div', { className: 'mb-5' },
                                        h('label', { className: 'text-xs font-semibold text-gray-500 mb-2 block' }, 'اسم الشركة أو المشروع'),
                                        h('h3', { className: 'font-bold text-xl text-gray-900 leading-tight' }, ticket.name)
                                    ),
                                    
                                    ticket.link && h('div', { className: 'mb-5 pb-5 border-b border-gray-100' },
                                        h('label', { className: 'text-xs font-semibold text-gray-500 mb-2 block' }, 'الرابط'),
                                        h('a', {
                                            href: ticket.link, target: '_blank',
                                            className: 'text-blue-600 hover:text-blue-700 text-sm hover:underline break-all',
                                            dir: 'ltr'
                                        }, ticket.link)
                                    ),
                                    
                                    h('div', { className: 'mb-5' },
                                        h('label', { className: 'text-xs font-semibold text-gray-500 mb-2 block' }, 'التفاصيل'),
                                        h('div', { className: 'bg-gray-50 rounded-lg p-4 border border-gray-200' },
                                            h('p', { 
                                                className: 'text-sm text-gray-700 leading-relaxed whitespace-pre-wrap',
                                                style: { maxHeight: '150px', overflowY: 'auto' }
                                            }, ticket.details)
                                        )
                                    ),
                                    
                                    (ticket.attachments?.length > 0) && h('div', null,
                                        h('label', { className: 'text-xs font-semibold text-gray-500 mb-3 block' }, 
                                            'المرفقات (' + ticket.attachments.length + ')'
                                        ),
                                        h('div', { className: 'grid grid-cols-3 gap-3' },
                                            ticket.attachments.slice(0, 6).map((img, i) =>
                                                h('img', {
                                                    key: i, src: img,
                                                    className: 'w-full h-28 object-cover rounded-lg cursor-pointer border border-gray-200 hover:border-gray-400 transition-all',
                                                    onClick: () => window.open(img, '_blank')
                                                })
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    ),

                    (filtered.length === 0) && h('div', { className: 'text-center py-20' },
                        h('p', { className: 'text-6xl mb-4' }, '📋'),
                        h('p', { className: 'text-xl font-semibold text-gray-600' }, 'لا توجد تذاكر'),
                        h('p', { className: 'text-gray-500' }, 'انقر على "تذكرة جديدة" للبدء')
                    )
                )
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
