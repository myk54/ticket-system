<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة التذاكر</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { font-family: 'Cairo', -apple-system, system-ui, sans-serif; }
        body { background: #fafafa; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
        const { useState, useEffect, createElement: h } = React;
        
        const SUPABASE_URL = 'https://dpffflftuydonufluwmx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7IaPwDdiUmyD182o3RB7Cw_8Q18zCXu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const getFileIcon = (filename) => {
            const ext = (filename || '').split('.').pop().toLowerCase();
            if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) return '🖼️';
            if (['pdf'].includes(ext)) return '📄';
            if (['doc', 'docx'].includes(ext)) return '📝';
            if (['xls', 'xlsx'].includes(ext)) return '📊';
            if (['ppt', 'pptx'].includes(ext)) return '📽️';
            if (['zip', 'rar', '7z'].includes(ext)) return '📦';
            if (['mp4', 'mov', 'avi'].includes(ext)) return '🎬';
            if (['mp3', 'wav'].includes(ext)) return '🎵';
            return '📎';
        };

        const isImage = (filename) => {
            const ext = (filename || '').split('.').pop().toLowerCase();
            return ['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext);
        };
        
        function App() {
            const [tickets, setTickets] = useState([]);
            const [isAddingTicket, setIsAddingTicket] = useState(false);
            const [editingTicket, setEditingTicket] = useState(null);
            const [viewingTicket, setViewingTicket] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [showImportModal, setShowImportModal] = useState(false);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const [uploadingFiles, setUploadingFiles] = useState(false);
            const [currentTicket, setCurrentTicket] = useState({
                name: '', link: '', details: '', attachments: [], status: 'pending',
                date: new Date().toISOString().split('T')[0]
            });

            useEffect(() => { fetchTickets(); }, []);

            const fetchTickets = async () => {
                setLoading(true);
                try {
                    const { data, error } = await supabase.from('tickets').select('*').order('created_at', { ascending: false });
                    if (error) throw error;
                    setTickets(data.map(t => ({
                        id: t.id, ticketNumber: t.ticket_number, name: t.name, link: t.link || '',
                        details: t.details, attachments: t.attachments || [], status: t.status, date: t.date
                    })));
                } catch (e) {
                    console.error('Error:', e);
                    alert('خطأ في تحميل التذاكر: ' + e.message);
                } finally { setLoading(false); }
            };

            const uploadFile = async (file) => {
                const fileName = `${Date.now()}-${Math.random().toString(36).substring(7)}.${file.name.split('.').pop()}`;
                const filePath = `uploads/${fileName}`;
                const { error } = await supabase.storage.from('attachments').upload(filePath, file);
                if (error) throw error;
                const { data: urlData } = supabase.storage.from('attachments').getPublicUrl(filePath);
                return { url: urlData.publicUrl, name: file.name, type: file.type, size: file.size, path: filePath };
            };

            const deleteFile = async (filePath) => {
                try { if (filePath) await supabase.storage.from('attachments').remove([filePath]); } catch (e) { console.error(e); }
            };

            const addTicket = async () => {
                if (!currentTicket.name || !currentTicket.details) return alert('الرجاء إدخال اسم الشركة والتفاصيل');
                setSaving(true);
                try {
                    const num = tickets.length > 0 ? Math.max(...tickets.map(t => t.ticketNumber || 0)) + 1 : 1;
                    const { error } = await supabase.from('tickets').insert([{
                        ticket_number: num, name: currentTicket.name, link: currentTicket.link,
                        details: currentTicket.details, attachments: currentTicket.attachments,
                        status: currentTicket.status, date: currentTicket.date
                    }]);
                    if (error) throw error;
                    await fetchTickets();
                    setCurrentTicket({ name: '', link: '', details: '', attachments: [], status: 'pending', date: new Date().toISOString().split('T')[0] });
                    setIsAddingTicket(false);
                } catch (e) { alert('خطأ: ' + e.message); } finally { setSaving(false); }
            };

            const updateTicket = async () => {
                setSaving(true);
                try {
                    const { error } = await supabase.from('tickets').update({
                        name: editingTicket.name, link: editingTicket.link, details: editingTicket.details,
                        attachments: editingTicket.attachments, status: editingTicket.status, date: editingTicket.date
                    }).eq('id', editingTicket.id);
                    if (error) throw error;
                    await fetchTickets();
                    setEditingTicket(null);
                } catch (e) { alert('خطأ: ' + e.message); } finally { setSaving(false); }
            };

            const deleteTicket = async (id) => {
                if (!window.confirm('هل أنت متأكد؟')) return;
                try {
                    const ticket = tickets.find(t => t.id === id);
                    if (ticket?.attachments) for (const att of ticket.attachments) if (att.path) await deleteFile(att.path);
                    const { error } = await supabase.from('tickets').delete().eq('id', id);
                    if (error) throw error;
                    await fetchTickets();
                } catch (e) { alert('خطأ: ' + e.message); }
            };

            const deleteAll = async () => {
                if (!window.confirm('حذف الكل؟')) return;
                try {
                    for (const t of tickets) if (t.attachments) for (const att of t.attachments) if (att.path) await deleteFile(att.path);
                    await supabase.from('tickets').delete().neq('id', 0);
                    setTickets([]);
                } catch (e) { alert('خطأ: ' + e.message); }
            };

            const handleFileUpload = async (e, isEdit) => {
                const files = Array.from(e.target.files);
                if (!files.length) return;
                setUploadingFiles(true);
                try {
                    const uploaded = [];
                    for (const file of files) {
                        if (file.size > 10 * 1024 * 1024) { alert(`${file.name} كبير جداً`); continue; }
                        uploaded.push(await uploadFile(file));
                    }
                    if (isEdit) setEditingTicket(p => ({ ...p, attachments: [...(p.attachments || []), ...uploaded] }));
                    else setCurrentTicket(p => ({ ...p, attachments: [...p.attachments, ...uploaded] }));
                } catch (err) { alert('خطأ: ' + err.message); } finally { setUploadingFiles(false); e.target.value = ''; }
            };

            const removeAttachment = async (index, isEdit) => {
                const atts = isEdit ? editingTicket.attachments : currentTicket.attachments;
                if (atts[index]?.path) await deleteFile(atts[index].path);
                if (isEdit) setEditingTicket(p => ({ ...p, attachments: p.attachments.filter((_, i) => i !== index) }));
                else setCurrentTicket(p => ({ ...p, attachments: p.attachments.filter((_, i) => i !== index) }));
            };

            const handleImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        let imported = [];
                        const extractText = (t) => typeof t === 'string' ? t : Array.isArray(t) ? t.map(i => typeof i === 'string' ? i : i?.text || '').join('') : t?.text || '';
                        
                        if (data.messages) {
                            imported = data.messages.filter(m => m.type === 'message' && m.text).map(msg => {
                                const txt = extractText(msg.text);
                                const nameMatch = txt.match(/(?:اسم المشروع او الشركة|اسم الشركة)[:\s]+(.+?)(?=\n|$)/is);
                                const urlMatch = txt.match(/(https?:\/\/[^\s\n]+)/i);
                                return {
                                    name: nameMatch?.[1]?.trim() || txt.split('\n')[0]?.substring(0, 100) || 'تذكرة',
                                    link: urlMatch?.[1] || '', details: txt, status: 'pending',
                                    date: msg.date?.split('T')[0] || new Date().toISOString().split('T')[0], attachments: []
                                };
                            });
                        } else if (Array.isArray(data)) {
                            imported = data.map(t => ({ name: t.name || 'تذكرة', link: t.link || '', details: t.details || '',
                                status: t.status || 'pending', date: t.date || new Date().toISOString().split('T')[0], attachments: t.attachments || [] }));
                        }
                        if (!imported.length) return alert('لم يتم العثور على بيانات');
                        
                        setSaving(true);
                        const start = tickets.length ? Math.max(...tickets.map(t => t.ticketNumber || 0)) + 1 : 1;
                        await supabase.from('tickets').insert(imported.map((t, i) => ({
                            ticket_number: start + i, name: t.name, link: t.link, details: t.details,
                            attachments: t.attachments, status: t.status, date: t.date
                        })));
                        await fetchTickets();
                        setShowImportModal(false);
                        alert('تم استيراد ' + imported.length + ' تذكرة');
                    } catch (err) { alert('خطأ: ' + err.message); } finally { setSaving(false); }
                };
                reader.readAsText(file);
            };

            const exportTickets = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob([JSON.stringify(tickets, null, 2)], { type: 'application/json' }));
                a.download = 'tickets-' + new Date().toISOString().split('T')[0] + '.json';
                a.click();
            };

            const filtered = tickets.filter(t => 
                (t.name.toLowerCase().includes(searchTerm.toLowerCase()) || t.details.toLowerCase().includes(searchTerm.toLowerCase())) &&
                (filterStatus === 'all' || t.status === filterStatus)
            );

            const stats = {
                total: tickets.length,
                pending: tickets.filter(t => t.status === 'pending').length,
                inProgress: tickets.filter(t => t.status === 'in-progress').length,
                completed: tickets.filter(t => t.status === 'completed').length
            };

            const renderAtt = (att, i) => {
                const name = att.name || att.url || 'file';
                return isImage(name) 
                    ? h('img', { key: i, src: att.url, className: 'w-full h-24 object-cover rounded-lg cursor-pointer border hover:border-gray-400', onClick: () => window.open(att.url, '_blank') })
                    : h('div', { key: i, onClick: () => window.open(att.url, '_blank'), className: 'w-full h-24 bg-gray-100 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-gray-200 border' },
                        h('span', { className: 'text-2xl' }, getFileIcon(name)),
                        h('span', { className: 'text-xs text-gray-600 mt-1 truncate w-full text-center px-1' }, name.substring(0, 12))
                    );
            };

            const renderEditAtt = (att, i, isEdit) => {
                const name = att.name || 'file';
                return h('div', { key: i, className: 'relative' },
                    isImage(name) 
                        ? h('img', { src: att.url, className: 'w-full h-16 object-cover rounded cursor-pointer', onClick: () => window.open(att.url, '_blank') })
                        : h('div', { className: 'w-full h-16 bg-gray-100 rounded flex flex-col items-center justify-center cursor-pointer', onClick: () => window.open(att.url, '_blank') },
                            h('span', { className: 'text-xl' }, getFileIcon(name)),
                            h('span', { className: 'text-xs text-gray-500 truncate w-full text-center px-1' }, name.substring(0, 8))
                        ),
                    h('button', { onClick: () => removeAttachment(i, isEdit), className: 'absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center' }, '×')
                );
            };

            const statusBadge = (status) => h('span', {
                className: 'px-3 py-1.5 rounded-lg text-sm font-semibold ' + (
                    status === 'completed' ? 'bg-green-100 text-green-700 border border-green-200' :
                    status === 'in-progress' ? 'bg-blue-100 text-blue-700 border border-blue-200' :
                    'bg-orange-100 text-orange-700 border border-orange-200'
                )
            }, status === 'completed' ? 'مكتمل' : status === 'in-progress' ? 'قيد التنفيذ' : 'قيد الانتظار');

            return h('div', { className: 'min-h-screen' },
                h('header', { className: 'bg-white border-b sticky top-0 z-40' },
                    h('div', { className: 'max-w-7xl mx-auto px-4 py-4' },
                        h('div', { className: 'flex flex-col md:flex-row md:items-center md:justify-between gap-4' },
                            h('div', null,
                                h('h1', { className: 'text-2xl font-bold text-gray-900' }, '🎫 نظام إدارة التذاكر'),
                                h('p', { className: 'text-gray-500 text-sm' }, 'إدارة وتتبع التذاكر بكفاءة')
                            ),
                            h('div', { className: 'flex flex-wrap gap-2' },
                                h('button', { onClick: () => setIsAddingTicket(true), className: 'bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700' }, '+ تذكرة جديدة'),
                                h('button', { onClick: () => setShowImportModal(true), className: 'bg-gray-100 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200' }, '📥 استيراد'),
                                h('button', { onClick: exportTickets, className: 'bg-gray-100 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200' }, '📤 تصدير'),
                                tickets.length > 0 && h('button', { onClick: deleteAll, className: 'bg-red-100 text-red-700 px-4 py-2 rounded-lg font-semibold hover:bg-red-200' }, '🗑️ حذف الكل')
                            )
                        )
                    )
                ),

                h('main', { className: 'max-w-7xl mx-auto px-4 py-6' },
                    h('div', { className: 'grid grid-cols-2 md:grid-cols-4 gap-4 mb-6' },
                        h('div', { className: 'bg-white p-4 rounded-xl border' }, h('p', { className: 'text-3xl font-bold' }, stats.total), h('p', { className: 'text-gray-500 text-sm' }, 'إجمالي التذاكر')),
                        h('div', { className: 'bg-orange-50 p-4 rounded-xl border border-orange-200' }, h('p', { className: 'text-3xl font-bold text-orange-600' }, stats.pending), h('p', { className: 'text-orange-600 text-sm' }, 'قيد الانتظار')),
                        h('div', { className: 'bg-blue-50 p-4 rounded-xl border border-blue-200' }, h('p', { className: 'text-3xl font-bold text-blue-600' }, stats.inProgress), h('p', { className: 'text-blue-600 text-sm' }, 'قيد التنفيذ')),
                        h('div', { className: 'bg-green-50 p-4 rounded-xl border border-green-200' }, h('p', { className: 'text-3xl font-bold text-green-600' }, stats.completed), h('p', { className: 'text-green-600 text-sm' }, 'مكتمل'))
                    ),

                    h('div', { className: 'flex flex-col md:flex-row gap-4 mb-6' },
                        h('input', { type: 'text', placeholder: '🔍 بحث...', value: searchTerm, onChange: e => setSearchTerm(e.target.value), className: 'flex-1 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none' }),
                        h('select', { value: filterStatus, onChange: e => setFilterStatus(e.target.value), className: 'px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white' },
                            h('option', { value: 'all' }, 'جميع الحالات'), h('option', { value: 'pending' }, 'قيد الانتظار'), h('option', { value: 'in-progress' }, 'قيد التنفيذ'), h('option', { value: 'completed' }, 'مكتمل')
                        )
                    ),

                    loading && h('div', { className: 'text-center py-20' }, h('div', { className: 'inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent' }), h('p', { className: 'mt-4 text-gray-500' }, 'جاري التحميل...')),

                    !loading && h('div', { className: 'grid md:grid-cols-2 lg:grid-cols-3 gap-4' },
                        filtered.map(ticket => h('div', { key: ticket.id, className: 'bg-white rounded-xl border hover:shadow-lg transition-shadow overflow-hidden' },
                            h('div', { className: 'p-5' },
                                h('div', { className: 'flex justify-between items-start mb-3' },
                                    h('span', { className: 'bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-semibold' }, '#' + ticket.ticketNumber),
                                    h('div', { className: 'flex gap-1' },
                                        h('button', { onClick: () => setEditingTicket({...ticket}), className: 'p-2 text-blue-600 hover:bg-blue-50 rounded-lg' }, '✏️'),
                                        h('button', { onClick: () => deleteTicket(ticket.id), className: 'p-2 text-red-600 hover:bg-red-50 rounded-lg' }, '🗑️')
                                    )
                                ),
                                h('h3', { className: 'font-bold text-lg text-gray-900 mb-2' }, ticket.name),
                                ticket.link && h('a', { href: ticket.link, target: '_blank', className: 'text-blue-600 text-sm hover:underline block mb-2 truncate', dir: 'ltr' }, ticket.link),
                                h('div', { className: 'mb-3' },
                                    h('p', { className: 'text-gray-600 text-sm' }, ticket.details.substring(0, 150)),
                                    ticket.details.length > 150 && h('button', { onClick: () => setViewingTicket(ticket), className: 'text-blue-600 text-xs font-semibold mt-2 hover:underline' }, 'اقرأ المزيد...')
                                ),
                                ticket.attachments?.length > 0 && h('div', { className: 'pt-3 border-t' },
                                    h('label', { className: 'text-xs font-semibold text-gray-500 block mb-3' }, '📎 المرفقات (' + ticket.attachments.length + ')'),
                                    h('div', { className: 'grid grid-cols-3 gap-2' },
                                        ticket.attachments.slice(0, 6).map((att, i) => renderAtt(att, i)),
                                        ticket.attachments.length > 6 && h('div', { key: 'more', onClick: () => setViewingTicket(ticket), className: 'w-full h-24 bg-gray-100 rounded-lg flex items-center justify-center cursor-pointer hover:bg-gray-200 border' }, h('span', { className: 'font-bold text-gray-700' }, '+' + (ticket.attachments.length - 6)))
                                    )
                                ),
                                h('div', { className: 'pt-3 border-t flex justify-between items-center' }, statusBadge(ticket.status), h('span', { className: 'text-sm text-gray-500' }, ticket.date))
                            )
                        ))
                    ),
                    !loading && filtered.length === 0 && h('div', { className: 'text-center py-20' }, h('p', { className: 'text-xl text-gray-500' }, 'لا توجد تذاكر'))
                ),

                // Add Modal
                isAddingTicket && h('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4', onClick: () => !saving && !uploadingFiles && setIsAddingTicket(false) },
                    h('div', { className: 'bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto', onClick: e => e.stopPropagation() },
                        h('div', { className: 'p-6 border-b' }, h('h3', { className: 'text-xl font-bold' }, 'إضافة تذكرة جديدة')),
                        h('div', { className: 'p-6 space-y-4' },
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'اسم الشركة *'), h('input', { type: 'text', value: currentTicket.name, onChange: e => setCurrentTicket(p => ({...p, name: e.target.value})), className: 'w-full px-4 py-3 border rounded-lg' })),
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'الرابط'), h('input', { type: 'url', value: currentTicket.link, onChange: e => setCurrentTicket(p => ({...p, link: e.target.value})), className: 'w-full px-4 py-3 border rounded-lg', dir: 'ltr' })),
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'التفاصيل *'), h('textarea', { value: currentTicket.details, onChange: e => setCurrentTicket(p => ({...p, details: e.target.value})), rows: 4, className: 'w-full px-4 py-3 border rounded-lg resize-none' })),
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'الحالة'), h('select', { value: currentTicket.status, onChange: e => setCurrentTicket(p => ({...p, status: e.target.value})), className: 'w-full px-4 py-3 border rounded-lg' }, h('option', { value: 'pending' }, 'قيد الانتظار'), h('option', { value: 'in-progress' }, 'قيد التنفيذ'), h('option', { value: 'completed' }, 'مكتمل'))),
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'التاريخ'), h('input', { type: 'date', value: currentTicket.date, onChange: e => setCurrentTicket(p => ({...p, date: e.target.value})), className: 'w-full px-4 py-3 border rounded-lg' })),
                            h('div', null,
                                h('label', { className: 'block text-sm font-semibold mb-2' }, 'المرفقات (صور، PDF، ملفات)'),
                                h('input', { type: 'file', multiple: true, onChange: e => handleFileUpload(e, false), disabled: uploadingFiles, className: 'w-full' }),
                                uploadingFiles && h('p', { className: 'text-blue-600 text-sm mt-2' }, '⏳ جاري رفع الملفات...'),
                                currentTicket.attachments.length > 0 && h('div', { className: 'grid grid-cols-4 gap-2 mt-3' }, currentTicket.attachments.map((att, i) => renderEditAtt(att, i, false)))
                            )
                        ),
                        h('div', { className: 'p-6 border-t flex gap-3' },
                            h('button', { onClick: addTicket, disabled: saving || uploadingFiles, className: 'flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 disabled:opacity-50' }, saving ? 'جاري الحفظ...' : 'إضافة'),
                            h('button', { onClick: () => setIsAddingTicket(false), disabled: saving || uploadingFiles, className: 'flex-1 bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 disabled:opacity-50' }, 'إلغاء')
                        )
                    )
                ),

                // Edit Modal
                editingTicket && h('div', { className: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4', onClick: () => !saving && !uploadingFiles && setEditingTicket(null) },
                    h('div', { className: 'bg-white rounded-xl shadow-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto', onClick: e => e.stopPropagation() },
                        h('div', { className: 'p-6 border-b' }, h('h3', { className: 'text-xl font-bold' }, 'تعديل التذكرة #' + editingTicket.ticketNumber)),
                        h('div', { className: 'p-6 space-y-4' },
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'اسم الشركة *'), h('input', { type: 'text', value: editingTicket.name, onChange: e => setEditingTicket(p => ({...p, name: e.target.value})), className: 'w-full px-4 py-3 border rounded-lg' })),
                            h('div', null, h('label', { className: 'block text-sm font-semibold mb-2' }, 'الرابط'), h('input', { type: 'url', value: editingTicket.link, onChange: e => setEditingTicket(p => ({...p, link: e.target.value})), className: 'w-full px-4 py-3 border rounded-lg', dir: 'ltr' })),
